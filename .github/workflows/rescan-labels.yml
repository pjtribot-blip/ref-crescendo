name: Rescan Labels for NULL Albums

# Re-scanne les articles dont label IS NULL ou '' et écrit les UPDATE
# directement en base. Pas de dry-run ni d'input — la passe 1 a été
# validée offline avec 0 faux positif.

on:
  workflow_dispatch:

jobs:
  rescan-labels:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install @supabase/supabase-js node-html-parser

      - name: Rescan labels (apply)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/rescan-labels-for-nulls.js --apply | tee rescan.log

      - name: Extract final report to GitHub Summary
        if: always()
        run: |
          echo "## Rapport final" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          awk '/RAPPORT FINAL/,0' rescan.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(rapport final indisponible — voir logs)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload full log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rescan-labels-log
          path: rescan.log
          retention-days: 14
