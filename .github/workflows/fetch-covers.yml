name: Fetch Missing Covers
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
jobs:
  fetch-covers:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install @supabase/supabase-js node-html-parser
      - name: Fetch covers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/fetch-missing-covers.js
